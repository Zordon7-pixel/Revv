[phases.setup]
nixPkgs = ["nodejs_20", "python3", "gcc", "gnumake"]

[phases.install]
cmds = ["cd backend && npm install --build-from-source"]

[phases.build]
cmds = ["cd frontend && npm install --include=dev && npm run build"]

[start]
cmd = "cd backend && node src/db/seed.js; node src/app.js"

[variables]
NPM_CONFIG_PRODUCTION = "false"
